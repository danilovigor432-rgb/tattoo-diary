  <!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tattoo Diary</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    padding:20px;
    padding-bottom:100px;
}

h1{
    font-size:42px;
    margin-bottom:25px;
}

.card{
    background:#1b1b1b;
    padding:18px;
    border-radius:20px;
    margin-bottom:15px;
}

button{
    width:100%;
    border:none;
    border-radius:15px;
    padding:15px;
    font-size:18px;
    background:#2979ff;
    color:white;
    margin-top:10px;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#222;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
}

textarea{
    width:100%;
    height:80px;
    margin-top:10px;
    background:#222;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:16px;
}

.client{
    background:#181818;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

  <div id="appointments" class="hidden">

<h1>📅 Запись</h1>

<input id="date" type="date">

<input id="price" placeholder="Стоимость">

<textarea id="note"
placeholder="Описание тату, размер, место">
</textarea>

<button onclick="saveAppointment()">
Сохранить запись
</button>

<div id="appointmentsList"></div>

</div>


<div class="navbar">

<div class="active"
onclick="showPage('home')">
🏠<br>Главная
</div>

<div onclick="showPage('clients')">
👥<br>Клиенты
</div>

<div onclick="showPage('appointments')">
📅<br>Записи
</div>

</div>


<script>

let clients =
JSON.parse(localStorage.getItem("clients")) || [];

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];


function showPage(page){

document.getElementById("home").classList.add("hidden");
document.getElementById("clients").classList.add("hidden");
document.getElementById("appointments").classList.add("hidden");

document.getElementById(page).classList.remove("hidden");

}


function addClient(){

let name =
document.getElementById("clientName").value;

let phone =
document.getElementById("clientPhone").value;

let idea =
document.getElementById("clientIdea").value;


if(name==""){
alert("Введите имя клиента");
return;
}


clients.push({
name:name,
phone:phone,
idea:idea
});


localStorage.setItem(
"clients",
JSON.stringify(clients)
);


renderClients();

alert("Клиент сохранен");

}


function renderClients(){

let html="";


clients.forEach(c=>{

html += `
<div class="client">
<h3>${c.name}</h3>
<p>${c.phone}</p>
<p>${c.idea}</p>
</div>
`;

});


document.getElementById("clientsList").innerHTML = html;

}


function saveAppointment(){

let date =
document.getElementById("date").value;

let price =
document.getElementById("price").value;

let note =
document.getElementById("note").value;


appointments.push({
date,
price,
note
});


localStorage.setItem(
"appointments",
JSON.stringify(appointments)
);


renderAppointments();

alert("Запись сохранена");

}


function renderAppointments(){

let html="";


appointments.forEach(a=>{

html += `
<div class="client">
<h3>${a.date}</h3>
<p>💵 $${a.price}</p>
<p>${a.note}</p>
</div>
`;

});


document.getElementById("appointmentsList").innerHTML = html;

}


renderClients();
renderAppointments();

</script>

</body>

</html>
