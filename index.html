<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tattoo Diary</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif}

body{
  background:#000;
  color:white;
  padding:25px;
  padding-bottom:105px;
}

.logo{font-size:40px;font-weight:bold;margin-bottom:8px}
.sub{color:#888;margin-bottom:25px}
h1{font-size:42px;margin-bottom:20px}
h2{font-size:26px;margin-bottom:15px}

.card{
  background:#121212;
  border-radius:30px;
  padding:25px;
  margin-top:20px;
  box-shadow:0 0 35px #061f66;
}

button{
  background:#2962ff;
  color:white;
  border:0;
  border-radius:20px;
  padding:18px;
  font-size:22px;
  width:100%;
  margin-top:15px;
}

  button.red{background:#9b1c1c}
button.gray{background:#2a2a2a}
button.green{background:#16833a}

input,textarea,select{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:0;
  border-radius:15px;
  background:#222;
  color:white;
  font-size:18px;
}

textarea{height:90px}

.client,.session{
  background:#111;
  padding:18px;
  border-radius:20px;
  margin-top:15px;
}

.client p,.session p{
  color:#bbb;
  margin-top:6px;
}

.page{display:none}
.show{display:block}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#070707;
  display:flex;
  justify-content:space-around;
  padding:15px;
  border-top:1px solid #222;
}

.nav{
  color:#999;
  text-align:center;
  font-size:14px;
}

.active{color:white}
</style>
</head>
<body>

  <div id="home" class="page show">

<div class="logo">
🖋 Tattoo Diary
</div>

<div class="sub">
Премиальный дневник мастера
</div>

<div class="card">

<h2>Добро пожаловать, Игорь</h2>

<p>
Клиенты, оплаты и записи всегда под рукой
</p>

<button onclick="openPage('clients')">
👥 Клиенты
</button>

<button onclick="openPage('sessions')">
📅 Записи
</button>

</div>

</div>


<div id="clients" class="page">

<h1>
👥 Клиенты
</h1>

<div class="card">

<h2>
Новый клиент
</h2>

<input id="name" placeholder="Имя клиента">

<input id="phone" placeholder="Телефон">

<input id="style" placeholder="Эскиз / стиль">

<input id="price" placeholder="Полная стоимость $">

<input id="paid" placeholder="Внесено $">

<textarea id="notes" placeholder="Заметки о клиенте"></textarea>

<button onclick="addClient()">
➕ Сохранить клиента
</button>

</div>


<div class="card">

<h2>
Список клиентов
</h2>

<div id="clientList">
</div>

</div>

</div>

  <div id="profile" class="page">

<h1 id="profileName">
Клиент
</h1>

<div class="card">

<p id="profilePhone"></p>

<p id="profileStyle"></p>

<p id="profileMoney"></p>

<p id="profileNotes"></p>

<button class="green"
onclick="addPayment()">
💵 Добавить оплату
</button>

<button class="gray"
onclick="editClient()">
✏️ Редактировать
</button>

<button class="red"
onclick="deleteCurrentClient()">
🗑 Удалить клиента
</button>

<button class="gray"
onclick="openPage('clients')">
← Назад
</button>

</div>

</div>


<div id="sessions" class="page">

<h1>
📅 Записи
</h1>

<div class="card">

<h2>
Новая запись
</h2>

<select id="sessionClient">
</select>

<input id="sessionDate"
type="date">

<input id="sessionTime"
type="time">

<input id="sessionHours"
placeholder="Длительность (часов)">

<textarea id="sessionIdea"
placeholder="Что делаем, эскиз, место">
</textarea>

<button onclick="addSession()">
➕ Сохранить запись
</button>

</div>


<div class="card">

<h2>
Ближайшие записи
</h2>

<div id="sessionList">
</div>

</div>

</div>

  <div id="edit" class="page">

<h1>
✏️ Редактировать
</h1>

<div class="card">

<input id="editName" placeholder="Имя клиента">

<input id="editPhone" placeholder="Телефон">

<input id="editStyle" placeholder="Эскиз / стиль">

<input id="editPrice" placeholder="Полная стоимость $">

<input id="editPaid" placeholder="Внесено $">

<textarea id="editNotes" placeholder="Заметки"></textarea>

<button onclick="saveEdit()">
✅ Сохранить изменения
</button>

<button class="gray" onclick="openPage('profile')">
Отмена
</button>

</div>

</div>


<div class="bottom">

<div class="nav active" onclick="openPage('home')">
🏠<br>Главная
</div>

<div class="nav" onclick="openPage('clients')">
👥<br>Клиенты
</div>

<div class="nav" onclick="openPage('sessions')">
📅<br>Записи
</div>

<div class="nav">
💵<br>Финансы
</div>

</div>

  <script>
let clients = JSON.parse(localStorage.getItem("clients") || "[]");
let sessions = JSON.parse(localStorage.getItem("sessions") || "[]");
let currentClient = null;

function saveData(){
  localStorage.setItem("clients", JSON.stringify(clients));
  localStorage.setItem("sessions", JSON.stringify(sessions));
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));
  document.getElementById(id).classList.add("show");

  document.querySelectorAll(".nav").forEach(n => n.classList.remove("active"));
  if(id==="home") document.querySelectorAll(".nav")[0].classList.add("active");
  if(id==="clients") document.querySelectorAll(".nav")[1].classList.add("active");
  if(id==="sessions") document.querySelectorAll(".nav")[2].classList.add("active");

  renderClientOptions();
  renderSessions();
}

function addClient(){
  let client = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    style: document.getElementById("style").value,
    price: Number(document.getElementById("price").value || 0),
    paid: Number(document.getElementById("paid").value || 0),
    notes: document.getElementById("notes").value
  };

  if(!client.name){
    alert("Введите имя клиента");
    return;
  }

  clients.push(client);
  saveData();
  renderClients();
  renderClientOptions();

  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("style").value="";
  document.getElementById("price").value="";
  document.getElementById("paid").value="";
  document.getElementById("notes").value="";

  alert("Клиент добавлен ✅");
}

function renderClients(){
  let html = "";

  clients.forEach((c, index) => {
    let debt = c.price - c.paid;

    html += `
      <div class="client" onclick="showClient(${index})">
        <h2>${c.name}</h2>
        <p>📞 ${c.phone}</p>
        <p>🎨 ${c.style}</p>
        <p>💰 Остаток: $${debt}</p>
      </div>
    `;
  });

  document.getElementById("clientList").innerHTML =
    html || "<p>Клиентов пока нет</p>";
}

function showClient(index){
  currentClient = index;
  let c = clients[index];
  let debt = c.price - c.paid;

  document.getElementById("profileName").innerText = c.name;
  document.getElementById("profilePhone").innerText = "📞 " + c.phone;
  document.getElementById("profileStyle").innerText = "🎨 " + c.style;
  document.getElementById("profileMoney").innerText =
    "💰 Цена: $" + c.price + " | Внесено: $" + c.paid + " | Остаток: $" + debt;
  document.getElementById("profileNotes").innerText =
    "📝 " + (c.notes || "Нет заметок");

  openPage("profile");
}

function addPayment(){
  let amount = prompt("Сколько клиент доплатил?");
  if(!amount) return;

  clients[currentClient].paid =
    Number(clients[currentClient].paid) + Number(amount);

  saveData();
  renderClients();
  showClient(currentClient);
}

function editClient(){
  let c = clients[currentClient];

  document.getElementById("editName").value = c.name;
  document.getElementById("editPhone").value = c.phone;
  document.getElementById("editStyle").value = c.style;
  document.getElementById("editPrice").value = c.price;
  document.getElementById("editPaid").value = c.paid;
  document.getElementById("editNotes").value = c.notes;

  openPage("edit");
}

function saveEdit(){
  clients[currentClient] = {
    name: document.getElementById("editName").value,
    phone: document.getElementById("editPhone").value,
    style: document.getElementById("editStyle").value,
    price: Number(document.getElementById("editPrice").value || 0),
    paid: Number(document.getElementById("editPaid").value || 0),
    notes: document.getElementById("editNotes").value
  };

  saveData();
  renderClients();
  showClient(currentClient);
}

function deleteCurrentClient(){
  if(!confirm("Удалить клиента?")) return;

  clients.splice(currentClient, 1);
  saveData();
  renderClients();
  renderClientOptions();
  openPage("clients");
}

function renderClientOptions(){
  let select = document.getElementById("sessionClient");
  if(!select) return;

  select.innerHTML = clients.map((c, index) =>
    `<option value="${index}">${c.name}</option>`
  ).join("");

  if(clients.length === 0){
    select.innerHTML = `<option>Сначала добавьте клиента</option>`;
  }
}

function addSession(){
  if(clients.length === 0){
    alert("Сначала добавьте клиента");
    return;
  }

  let clientIndex = Number(document.getElementById("sessionClient").value);
  let client = clients[clientIndex];

  let session = {
    clientIndex: clientIndex,
    clientName: client.name,
    date: document.getElementById("sessionDate").value,
    time: document.getElementById("sessionTime").value,
    hours: document.getElementById("sessionHours").value,
    idea: document.getElementById("sessionIdea").value
  };

  if(!session.date || !session.time){
    alert("Введите дату и время");
    return;
  }

  sessions.push(session);
  saveData();
  renderSessions();

  document.getElementById("sessionDate").value="";
  document.getElementById("sessionTime").value="";
  document.getElementById("sessionHours").value="";
  document.getElementById("sessionIdea").value="";

  alert("Запись добавлена ✅");
}

function renderSessions(){
  let html = "";

  sessions.forEach((s, index) => {
    let client = clients[s.clientIndex];
    let debt = client ? client.price - client.paid : 0;

    html += `
      <div class="session">
        <h2>${s.date} — ${s.time}</h2>
        <p>👤 ${s.clientName}</p>
        <p>🎨 ${s.idea || "Без описания"}</p>
        <p>⏱ ${s.hours || "?"} часов</p>
        <p>💰 Остаток клиента: $${debt}</p>
        <button class="red" onclick="deleteSession(${index})">Удалить запись</button>
      </div>
    `;
  });

  document.getElementById("sessionList").innerHTML =
    html || "<p>Записей пока нет</p>";
}

function deleteSession(index){
  if(!confirm("Удалить запись?")) return;

  sessions.splice(index, 1);
  saveData();
  renderSessions();
}

renderClients();
renderClientOptions();
renderSessions();
</script>

</body>
</html>
