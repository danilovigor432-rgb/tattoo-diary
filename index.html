<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tattoo Diary</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif}

body{
  background:#000;
  color:white;
  padding:25px;
  padding-bottom:105px;
}

.logo{font-size:40px;font-weight:bold;margin-bottom:8px}
.sub{color:#888;margin-bottom:25px}
h1{font-size:42px;margin-bottom:20px}
h2{font-size:26px;margin-bottom:15px}

.card{
  background:#121212;
  border-radius:30px;
  padding:25px;
  margin-top:20px;
  box-shadow:0 0 35px #061f66;
}

button{
  background:#2962ff;
  color:white;
  border:0;
  border-radius:20px;
  padding:18px;
  font-size:22px;
  width:100%;
  margin-top:15px;
}

  button.red{background:#9b1c1c}
button.gray{background:#2a2a2a}
button.green{background:#16833a}

input,textarea{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:0;
  border-radius:15px;
  background:#222;
  color:white;
  font-size:18px;
}

textarea{height:90px}

.client{
  background:#111;
  padding:18px;
  border-radius:20px;
  margin-top:15px;
}

.client p{
  color:#bbb;
  margin-top:6px;
}

.page{display:none}
.show{display:block}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#070707;
  display:flex;
  justify-content:space-around;
  padding:15px;
  border-top:1px solid #222;
}

.nav{
  color:#999;
  text-align:center;
  font-size:14px;
}

.active{color:white}
</style>
</head>
<body>

  <div id="home" class="page show">

<div class="logo">
🖋 Tattoo Diary
</div>

<div class="sub">
Премиальный дневник мастера
</div>

<div class="card">

<h2>Добро пожаловать, Игорь</h2>

<p>
Ваши клиенты, оплаты и проекты всегда под рукой
</p>

<button onclick="openPage('clients')">
👥 Клиенты
</button>

</div>

</div>


<div id="clients" class="page">

<h1>
👥 Клиенты
</h1>

<div class="card">

<h2>
Новый клиент
</h2>

<input id="name" placeholder="Имя клиента">

<input id="phone" placeholder="Телефон">

<input id="style"
placeholder="Эскиз / стиль">

<input id="price"
placeholder="Полная стоимость $">

<input id="paid"
placeholder="Внесено $">

<textarea id="notes"
placeholder="Заметки о клиенте">
</textarea>

<button onclick="addClient()">
➕ Сохранить клиента
</button>

</div>


<div class="card">

<h2>
Список клиентов
</h2>

<div id="clientList">
</div>

</div>

</div>


<div id="profile" class="page">

<h1 id="profileName">
Клиент
</h1>

<div class="card">

<p id="profilePhone"></p>

<p id="profileStyle"></p>

<p id="profileMoney"></p>

<p id="profileNotes"></p>

<button class="green"
onclick="addPayment()">
💵 Добавить оплату
</button>

<button class="gray"
onclick="editClient()">
✏️ Редактировать
</button>

<button class="red"
onclick="deleteCurrentClient()">
🗑 Удалить клиента
</button>

<button class="gray"
onclick="openPage('clients')">
← Назад
</button>

</div>

</div>

  <div id="edit" class="page">

<h1>
✏️ Редактировать
</h1>

<div class="card">

<input id="editName" placeholder="Имя клиента">

<input id="editPhone" placeholder="Телефон">

<input id="editStyle" placeholder="Эскиз / стиль">

<input id="editPrice" placeholder="Полная стоимость $">

<input id="editPaid" placeholder="Внесено $">

<textarea id="editNotes" placeholder="Заметки"></textarea>

<button onclick="saveEdit()">
✅ Сохранить изменения
</button>

<button class="gray" onclick="openPage('profile')">
Отмена
</button>

</div>

</div>


<div class="bottom">

<div class="nav active" onclick="openPage('home')">
🏠<br>Главная
</div>

<div class="nav" onclick="openPage('clients')">
👥<br>Клиенты
</div>

<div class="nav">
📅<br>Записи
</div>

<div class="nav">
💵<br>Финансы
</div>

</div>

  <script>
let clients = JSON.parse(localStorage.getItem("clients") || "[]");
let currentClient = null;

function saveData(){
  localStorage.setItem("clients", JSON.stringify(clients));
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));
  document.getElementById(id).classList.add("show");

  document.querySelectorAll(".nav").forEach(n => n.classList.remove("active"));
  if(id==="home") document.querySelectorAll(".nav")[0].classList.add("active");
  if(id==="clients") document.querySelectorAll(".nav")[1].classList.add("active");
}

function addClient(){
  let client = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    style: document.getElementById("style").value,
    price: Number(document.getElementById("price").value || 0),
    paid: Number(document.getElementById("paid").value || 0),
    notes: document.getElementById("notes").value
  };

  if(!client.name){
    alert("Введите имя клиента");
    return;
  }

  clients.push(client);
  saveData();
  renderClients();

  name.value="";
  phone.value="";
  style.value="";
  price.value="";
  paid.value="";
  notes.value="";

  alert("Клиент добавлен ✅");
}

function renderClients(){
  let html = "";

  clients.forEach((c, index) => {
    let debt = c.price - c.paid;

    html += `
      <div class="client" onclick="showClient(${index})">
        <h2>${c.name}</h2>
        <p>📞 ${c.phone}</p>
        <p>🎨 ${c.style}</p>
        <p>💰 Остаток: $${debt}</p>
      </div>
    `;
  });

  clientList.innerHTML = html || "<p>Клиентов пока нет</p>";
}

function showClient(index){
  currentClient = index;
  let c = clients[index];
  let debt = c.price - c.paid;

  profileName.innerText = c.name;
  profilePhone.innerText = "📞 " + c.phone;
  profileStyle.innerText = "🎨 " + c.style;
  profileMoney.innerText =
    "💰 Цена: $" + c.price + " | Внесено: $" + c.paid + " | Остаток: $" + debt;
  profileNotes.innerText = "📝 " + (c.notes || "Нет заметок");

  openPage("profile");
}

function addPayment(){
  let amount = prompt("Сколько клиент доплатил?");

  if(!amount) return;

  clients[currentClient].paid =
    Number(clients[currentClient].paid) + Number(amount);

  saveData();
  showClient(currentClient);
  renderClients();
}

function editClient(){
  let c = clients[currentClient];

  editName.value = c.name;
  editPhone.value = c.phone;
  editStyle.value = c.style;
  editPrice.value = c.price;
  editPaid.value = c.paid;
  editNotes.value = c.notes;

  openPage("edit");
}

function saveEdit(){
  clients[currentClient] = {
    name: editName.value,
    phone: editPhone.value,
    style: editStyle.value,
    price: Number(editPrice.value || 0),
    paid: Number(editPaid.value || 0),
    notes: editNotes.value
  };

  saveData();
  renderClients();
  showClient(currentClient);
}

function deleteCurrentClient(){
  if(!confirm("Удалить клиента?")) return;

  clients.splice(currentClient, 1);
  saveData();
  renderClients();
  openPage("clients");
}

renderClients();
</script>

</body>
</html>
